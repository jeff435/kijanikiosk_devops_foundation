---
- name: Configure staging environment
  hosts: localhost
  connection: local

  tasks:
    - name: Create staging namespace if missing
      kubernetes.core.k8s:
        name: kijani-staging
        api_version: v1
        kind: Namespace
        state: present

    - name: Apply staging ConfigMap
      kubernetes.core.k8s:
        namespace: kijani-staging
        definition:
          api_version: v1
          kind: ConfigMap
          metadata:
            name: kk-payments-config
          data:
            DB_HOST: "staging-postgres"
            LOG_LEVEL: "debug"
